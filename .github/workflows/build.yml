name: Build RAJ VIDEO LAB EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: >
          pyinstaller videolab.py --onefile --windowed --name RajVideoLab
          --collect-all customtkinter
          --collect-all imageio_ffmpeg

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: RAJ VIDEO LAB v1.0.${{ github.run_number }}
          files: dist/RajVideoLab.exe
